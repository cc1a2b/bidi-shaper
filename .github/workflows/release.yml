name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance attestation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Re-run all checks
        run: |
          npm run typecheck
          npm run lint
          npm test
          npm run build
      # Only publish when an NPM_TOKEN secret is configured. The check runs
      # inside a shell step because secrets are available there as env vars,
      # but are NOT reliably readable in a step-level `if:` expression.
      - name: Check for npm token
        id: token
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "set=true" >> "$GITHUB_OUTPUT"
          else
            echo "set=false" >> "$GITHUB_OUTPUT"
            echo "NPM_TOKEN secret not set — skipping publish (package can still be published manually)."
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish to npm (with provenance)
        if: steps.token.outputs.set == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
